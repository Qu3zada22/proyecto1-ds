schema: spec-driven
project: proyecto1-ds

context: |
  Stack: Python script-first project with `pyproject.toml`, `src/proyecto1_ds/`, and uv as the official project/dependency/test runner interface.
  Architecture: Bootstrap stage for a reproducible data-cleaning pipeline with immutable raw data and traceable manifests.
  Conventions: Course docs live in docs/ and current planning is in docs/planificacion.md.
  Artifact language: All project, SDD, and course deliverable artifacts must be written in Spanish.
  Testing: Pytest runs through uv with `uv run pytest` as the target command for future apply/verify phases.

testing:
  strict_tdd: true
  strict_tdd_requested: true
  reason: The bootstrap slice introduced a Python package manifest, uv dependency groups, and the pytest target command through uv.
  note: Future SDD apply/verify phases must enforce Strict TDD. Local execution requires installing `uv`, then running or syncing the project with `uv run pytest` or `uv sync --dev`.
  detected_at: 2026-07-13
  test_command: "uv run pytest"
  coverage_command: ""
  build_command: ""
  layers:
    unit:
      available: true
      tool: "uv run pytest"
    integration:
      available: false
      tool: ""
    e2e:
      available: false
      tool: ""
  quality:
    linter_command: ""
    type_checker_command: ""
    formatter_command: ""

rules:
  proposal:
    - Align every change with the CC3084 project rubric and reproducibility requirement.
    - State data source, extraction scope, and rollback plan for risky transformations.
  specs:
    - Use Given/When/Then scenarios and RFC 2119 keywords.
    - Keep requirements traceable to docs/instrucciones.md and docs/planificacion.md.
    - Write specs and all SDD artifacts in Spanish for this project.
  design:
    - Document data lineage, transformation rationale, and risks before implementation.
  tasks:
    - Keep tasks small enough for one session and map them to project slices when possible.
  apply:
    rules:
      - Follow existing repository conventions and keep raw data immutable.
      - Enable Strict TDD as soon as the project has an executable stack and test command.
    tdd: true
    test_command: "uv run pytest"
  verify:
    rules:
      - Use reproducible scripted validation once the pipeline exists.
    test_command: "uv run pytest"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive or data-dropping deltas.
